name: Build Mobi App Debug APK

on:
  push:
    branches:
      - "**"
    paths:
      - "mobi-app/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-8.9-${{ hashFiles('mobi-app/**/*.gradle.kts', 'mobi-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-8.9-

      - name: Build debug APK
        working-directory: mobi-app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobi-app-debug-${{ github.sha }}
          path: mobi-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
